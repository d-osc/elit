<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Elit Mobile Native Example</title>
    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #0b1220;
        color: #f8fafc;
        display: grid;
        place-items: center;
        min-height: 100vh;
      }
      .card {
        width: min(640px, 92vw);
        padding: 24px;
        background: #111827;
        border: 1px solid #334155;
        border-radius: 14px;
      }
      h1 {
        margin-top: 0;
      }
      code {
        background: #1e293b;
        padding: 2px 6px;
        border-radius: 6px;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Elit Mobile Native Example</h1>
      <p>This page is copied into native assets by <code>elit mobile sync</code>.</p>
      <p id="status">ready</p>
    </main>
    <script>
      document.getElementById('status').textContent = 'synced at ' + new Date().toISOString();
    </script>
  </body>
</html>
