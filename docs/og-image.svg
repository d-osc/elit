<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Elit Documentation</title>
  <desc id="desc">Full-stack TypeScript framework docs with reactive UI, routing, SSR, REST API, examples, and tutorials.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#09090b"/>
      <stop offset="100%" stop-color="#18181b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)" rx="32" ry="32"/>
  <circle cx="970" cy="130" r="180" fill="#6366f1" fill-opacity="0.18"/>
  <circle cx="1060" cy="510" r="220" fill="#22d3ee" fill-opacity="0.12"/>
  <g transform="translate(88 88) scale(1.42)">
    <rect width="100" height="100" rx="20" fill="url(#accent)"/>
    <rect x="28" y="25" width="44" height="8" rx="4" fill="#ffffff"/>
    <rect x="28" y="46" width="32" height="8" rx="4" fill="#ffffff"/>
    <rect x="28" y="67" width="44" height="8" rx="4" fill="#ffffff"/>
    <rect x="28" y="25" width="8" height="50" rx="4" fill="#ffffff"/>
    <circle cx="72" cy="50" r="6" fill="#ffffff" opacity="0.5"/>
  </g>

  <text x="88" y="320" fill="#ffffff" font-family="Segoe UI, Arial, sans-serif" font-size="94" font-weight="700">Elit</text>
  <text x="88" y="388" fill="#d4d4d8" font-family="Segoe UI, Arial, sans-serif" font-size="34">Documentation for the full-stack TypeScript framework</text>
  <text x="88" y="452" fill="#a1a1aa" font-family="Segoe UI, Arial, sans-serif" font-size="28">Reactive UI  •  Routing  •  SSR  •  REST API  •  Examples  •  Tutorials</text>

  <rect x="88" y="500" width="420" height="58" rx="29" fill="#111827" stroke="#27272a"/>
  <text x="118" y="538" fill="#ffffff" font-family="Segoe UI, Arial, sans-serif" font-size="24">elit.d-osc.com</text>
</svg>